<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徐州工程学院 AI 助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.header{background:#1e293b;padding:16px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #334155}
.header .dot{width:12px;height:12px;border-radius:50%;background:#22c55e}
.header h1{font-size:18px;font-weight:600}
.chat-box{flex:1;overflow-y:auto;padding:24px;max-width:800px;width:100%;margin:0 auto}
.msg{margin-bottom:20px;display:flex;gap:12px;animation:fadeIn .3s}
.msg.user{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.bot .avatar{background:#6366f1;color:#fff}
.msg.user .avatar{background:#3b82f6;color:#fff}
.bubble{max-width:75%;padding:12px 16px;border-radius:16px;line-height:1.6;font-size:15px;white-space:pre-wrap;word-break:break-word}
.msg.bot .bubble{background:#1e293b;border-bottom-left-radius:4px}
.msg.user .bubble{background:#3b82f6;color:#fff;border-bottom-right-radius:4px}
.typing{display:flex;gap:4px;padding:12px 16px}
.typing span{width:8px;height:8px;background:#64748b;border-radius:50%;animation:blink 1.4s infinite both}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.input-area{padding:16px 24px;background:#1e293b;border-top:1px solid #334155;max-width:800px;width:100%;margin:0 auto}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;padding:12px 16px;border-radius:12px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:15px;outline:none;transition:border .2s}
.input-row input:focus{border-color:#6366f1}
.input-row button{padding:12px 24px;border-radius:12px;border:none;background:#6366f1;color:#fff;font-size:15px;cursor:pointer;transition:background .2s}
.input-row button:hover{background:#818cf8}
.input-row button:disabled{background:#475569;cursor:not-allowed}

/* 密码遮罩层 */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.95);display:flex;align-items:center;justify-content:center;z-index:9999}
.auth-box{background:#1e293b;padding:32px;border-radius:16px;width:90%;max-width:400px;text-align:center}
.auth-box h2{margin-bottom:16px;font-size:22px}
.auth-box p{color:#94a3b8;margin-bottom:20px}
.auth-box input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:16px;margin-bottom:16px;outline:none}
.auth-box input:focus{border-color:#6366f1}
.auth-box button{width:100%;padding:12px;border-radius:12px;border:none;background:#6366f1;color:#fff;font-size:16px;cursor:pointer}
.auth-box button:hover{background:#818cf8}
.auth-box .error{color:#ef4444;margin-top:12px;font-size:14px}
.hidden{display:none}
</style>
</head>
<body>
<div class="overlay" id="authOverlay">
<div class="auth-box">
<h2>访问密码</h2>
<p>请输入密码以访问 AI 助手</p>
<input id="pwdInput" type="password" placeholder="密码" autofocus>
<button onclick="checkPassword()">确认</button>
<div class="error" id="authError"></div>
</div>
</div>

<div class="content hidden" id="mainContent">
<div class="header"><div class="dot"></div><h1>徐州工程学院 AI 助手</h1></div>
<div class="chat-box" id="chatBox"></div>
<div class="input-area">
<div class="input-row">
<input id="userInput" placeholder="输入你的问题...">
<button id="sendBtn" onclick="send()">发送</button>
</div>
</div>
</div>

<script>
const PASSWORD = "a123456789"; // 密码在这里设置

function checkPassword(){
const input=document.getElementById('pwdInput').value;
const error=document.getElementById('authError');
if(input===PASSWORD){
document.getElementById('authOverlay').classList.add('hidden');
document.getElementById('mainContent').classList.remove('hidden');
initChat();
}else{
error.textContent='密码错误，请重试';
pwdInput.value='';
pwdInput.focus();
}
}

function initChat(){
const chatBox=document.getElementById('chatBox');
const userInput=document.getElementById('userInput');
const sendBtn=document.getElementById('sendBtn');

userInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});

function addMsg(role,text){
const div=document.createElement('div');
div.className=`msg ${role}`;
div.innerHTML=`<div class="avatar">${role==='user'?'你':'AI'}</div><div class="bubble">${escapeHtml(text)}</div>`;
chatBox.appendChild(div);chatBox.scrollTop=chatBox.scrollHeight;
}

function addTyping(){
const div=document.createElement('div');div.className='msg bot';div.id='typing';
div.innerHTML='<div class="avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
chatBox.appendChild(div);chatBox.scrollTop=chatBox.scrollHeight;
}

function removeTyping(){const el=document.getElementById('typing');if(el)el.remove();}

function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

window.send=async function(){
const q=userInput.value.trim();if(!q)return;
addMsg('user',q);userInput.value='';sendBtn.disabled=true;addTyping();
try{
const r=await fetch('/ai_chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
const data=await r.json();removeTyping();
if(data.error)addMsg('bot','出错了：'+data.error);else addMsg('bot',data.answer);
}catch(e){removeTyping();addMsg('bot','网络错误，请重试');}
sendBtn.disabled=false;userInput.focus();
}

addMsg('bot','你好！我是徐州工程学院 AI 助手，有什么可以帮你的？');
}
</script>
</body>
</html>
