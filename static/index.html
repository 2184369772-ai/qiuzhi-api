<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徐州工程学院 AI 助手</title>
<style>
:root {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #334155;
  --text-primary: #f8fafc;
  --text-secondary: #cbd5e1;
  --accent-primary: #6366f1;
  --accent-secondary: #818cf8;
  --accent-gradient: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
  --success: #22c55e;
  --error: #ef4444;
  --border: #475569;
  --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.header {
  background: var(--bg-secondary);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
  z-index: 10;
}

.logo {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--accent-gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: white;
  font-size: 18px;
}

.header h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.025em;
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  font-size: 14px;
  color: var(--text-secondary);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  padding: 24px;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0;
  scroll-behavior: smooth;
}

.chat-box::-webkit-scrollbar {
  width: 6px;
}

.chat-box::-webkit-scrollbar-track {
  background: var(--bg-secondary);
  border-radius: 3px;
}

.chat-box::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.message {
  margin-bottom: 24px;
  display: flex;
  gap: 16px;
  animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.message.user {
  flex-direction: row-reverse;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  flex-shrink: 0;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

.message.bot .avatar {
  background: var(--accent-gradient);
  color: white;
}

.message.user .avatar {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.bubble {
  max-width: 75%;
  padding: 16px 20px;
  border-radius: 18px;
  line-height: 1.6;
  font-size: 15px;
  white-space: pre-wrap;
  word-break: break-word;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  backdrop-filter: blur(10px);
  transition: all 0.2s ease;
}

.message.bot .bubble {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-bottom-left-radius: 6px;
  color: var(--text-primary);
}

.message.user .bubble {
  background: var(--accent-gradient);
  border-bottom-right-radius: 6px;
  color: white;
}

.typing {
  display: flex;
  gap: 4px;
  padding: 16px 20px;
}

.typing span {
  width: 8px;
  height: 8px;
  background: var(--border);
  border-radius: 50%;
  animation: blink 1.4s infinite both;
}

.typing span:nth-child(2) {
  animation-delay: 0.2s;
}

.typing span:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes blink {
  0%, 80%, 100% {
    opacity: 0.3;
  }
  40% {
    opacity: 1;
  }
}

.input-area {
  background: var(--bg-secondary);
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  backdrop-filter: blur(10px);
}

.input-row {
  display: flex;
  gap: 12px;
  align-items: center;
}

.input-row input {
  flex: 1;
  padding: 14px 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 15px;
  outline: none;
  transition: all 0.2s ease;
}

.input-row input:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.input-row input::placeholder {
  color: var(--text-secondary);
}

.input-row button {
  padding: 14px 28px;
  border-radius: 12px;
  border: none;
  background: var(--accent-gradient);
  color: white;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
}

.input-row button:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
}

.input-row button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.input-row button:active {
  transform: translateY(0);
}

/* 密码遮罩层 */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(15, 23, 42, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(10px);
}

.auth-box {
  background: var(--bg-secondary);
  padding: 40px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.auth-box h2 {
  margin-bottom: 16px;
  font-size: 24px;
  font-weight: 600;
}

.auth-box p {
  color: var(--text-secondary);
  margin-bottom: 24px;
  font-size: 15px;
}

.auth-box input {
  width: 100%;
  padding: 14px 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 16px;
  margin-bottom: 16px;
  outline: none;
  transition: all 0.2s ease;
}

.auth-box input:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.auth-box button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--accent-gradient);
  color: white;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.auth-box button:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
}

.auth-box .error {
  color: var(--error);
  margin-top: 12px;
  font-size: 14px;
}

.hidden {
  display: none !important;
}

/* 响应式设计 */
@media (max-width: 768px) {
  .header {
    padding: 16px 20px;
  }
  
  .header h1 {
    font-size: 18px;
  }
  
  .chat-container {
    padding: 16px;
  }
  
  .bubble {
    max-width: 85%;
    padding: 12px 16px;
    font-size: 14px;
  }
  
  .input-row {
    flex-wrap: wrap;
  }
  
  .input-row input {
    width: 100%;
  }
  
  .input-row button {
    width: 100%;
    margin-top: 8px;
  }
}
</style>
</head>
<body>
<div class="overlay" id="authOverlay">
<div class="auth-box">
<h2>访问密码</h2>
<p>请输入密码以访问 AI 助手</p>
<input id="pwdInput" type="password" placeholder="密码" autofocus>
<button onclick="checkPassword()">确认</button>
<div class="error" id="authError"></div>
</div>
</div>

<div class="content hidden" id="mainContent">
<div class="header">
<div class="logo">XZIT</div>
<h1>徐州工程学院 AI 助手</h1>
<div class="status-indicator">
<div class="status-dot"></div>
<span>在线</span>
</div>
</div>
<div class="chat-container">
<div class="chat-box" id="chatBox"></div>
<div class="input-area">
<div class="input-row">
<input id="userInput" placeholder="输入你的问题，按 Enter 发送..." autofocus>
<button id="sendBtn" onclick="send()">发送</button>
</div>
</div>
</div>
</div>

<script>
const PASSWORD = "a123456789";
const API_KEY = "a123456789"; // 后端鉴权用的 Key

function checkPassword() {
const input = document.getElementById('pwdInput').value;
const error = document.getElementById('authError');
if (input === PASSWORD) {
document.getElementById('authOverlay').classList.add('hidden');
document.getElementById('mainContent').classList.remove('hidden');
document.getElementById('userInput').focus();
initChat();
} else {
error.textContent = '密码错误，请重试';
pwdInput.value = '';
pwdInput.focus();
}
}

function initChat() {
const chatBox = document.getElementById('chatBox');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

userInput.addEventListener('keydown', e => {
if (e.key === 'Enter' && !e.shiftKey) {
e.preventDefault();
send();
}
});

function addMsg(role, text) {
const div = document.createElement('div');
div.className = `message ${role}`;
div.innerHTML = `<div class="avatar">${role === 'user' ? '你' : 'AI'}</div><div class="bubble">${escapeHtml(text)}</div>`;
chatBox.appendChild(div);
chatBox.scrollTop = chatBox.scrollHeight;
}

function addTyping() {
const div = document.createElement('div');
div.className = 'message bot';
div.id = 'typing';
div.innerHTML = '<div class="avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
chatBox.appendChild(div);
chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
const el = document.getElementById('typing');
if (el) el.remove();
}

function escapeHtml(text) {
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

window.send = async function() {
const q = userInput.value.trim();
if (!q) return;

addMsg('user', q);
userInput.value = '';
sendBtn.disabled = true;
addTyping();

try {
const res = await fetch('/ai_chat', {
method: 'POST',
headers: { 
'Content-Type': 'application/json',
'X-API-Key': API_KEY
},
body: JSON.stringify({ question: q })
});
const data = await res.json();
removeTyping();

// 调试日志
console.log('API Response:', data);

if (data.error) {
addMsg('bot', '出错了：' + data.error);
} else if (data.answer) {
addMsg('bot', data.answer);
} else {
addMsg('bot', '响应格式错误：' + JSON.stringify(data));
}
} catch (e) {
removeTyping();
addMsg('bot', '网络错误：' + e.message);
}

sendBtn.disabled = false;
userInput.focus();
};

addMsg('bot', '你好！我是徐州工程学院 AI 助手，有什么可以帮你的？');
}
</script>
</body>
</html>
